<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة إدارة الوصول ZBID - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --maroon: #800000; --gold: #d4af37; --bg: #fdfaf1; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; }
        .admin-card { background: white; max-width: 900px; margin: auto; border-radius: 15px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-top: 8px solid var(--maroon); }
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; min-width: 200px; }
        .btn-add { background: #2e7d32; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* تنسيق زر التحديث الجديد */
        .refresh-btn { 
            background: var(--gold); 
            color: var(--maroon); 
            border: none; 
            padding: 8px 15px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-right: 15px;
            font-size: 0.9rem;
        }
        .refresh-btn:hover { opacity: 0.9; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--maroon); color: var(--gold); padding: 12px; }
        td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; }
        .btn-del { background: #c62828; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .stats-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; background: #f9f9f9; padding: 10px 15px; border-radius: 10px; }
        .stats { font-weight: bold; color: var(--maroon); }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="header">
        <h2>إدارة قائمة الطلاب المعتمدة (ZBID) 🔒</h2>
        <p>تتحكم هذه القائمة فيمن يمكنه دخول اختبارات القدرات</p>
    </div>

    <div class="stats-container">
        <div class="stats" id="studentCount">عدد الطلاب المسجلين: جاري التحميل...</div>
        <!-- زر التحديث مضاف هنا -->
        <button class="refresh-btn" onclick="fetchStudents()">تحديث القائمة 🔄</button>
    </div>

    <div class="input-group">
        <input type="text" id="newName" placeholder="اسم الطالب الثلاثي">
        <input type="email" id="newEmail" placeholder="البريد الوزاري (sxxxxxxx@rb.moe.gov.sa)">
        <button class="btn-add" onclick="addStudent()">إضافة طالب جديد +</button>
    </div>

    <table id="studentsTable">
        <thead>
            <tr>
                <th>الاسم</th>
                <th>البريد الإلكتروني</th>
                <th>الإجراء</th>
            </tr>
        </thead>
        <tbody>
            <!-- قائمة الطلاب تظهر هنا -->
        </tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let unsubscribe = null; // لتجنب تكرار المستمعين عند الضغط على تحديث

    function fetchStudents() {
        const tbody = document.querySelector("#studentsTable tbody");
        const countDiv = document.getElementById("studentCount");
        
        // إيقاف المستمع القديم إذا وجد قبل بدء تحديث جديد
        if (unsubscribe) unsubscribe();

        tbody.innerHTML = "<tr><td colspan='3'>جاري تحديث البيانات...</td></tr>";

        unsubscribe = db.collection("allowed_students").orderBy("name").onSnapshot((snapshot) => {
            tbody.innerHTML = "";
            countDiv.innerText = `عدد الطلاب المسجلين: ${snapshot.size}`;
            
            if (snapshot.empty) {
                tbody.innerHTML = "<tr><td colspan='3'>لا يوجد طلاب مسجلون حالياً.</td></tr>";
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                tbody.innerHTML += `
                    <tr>
                        <td>${data.name}</td>
                        <td>${doc.id}</td>
                        <td><button class="btn-del" onclick="deleteStudent('${doc.id}')">حذف 🗑️</button></td>
                    </tr>
                `;
            });
        }, (error) => {
            console.error("خطأ في جلب البيانات:", error);
            tbody.innerHTML = "<tr><td colspan='3'>حدث خطأ أثناء تحميل البيانات.</td></tr>";
        });
    }

    async function addStudent() {
        const name = document.getElementById("newName").value.trim();
        const email = document.getElementById("newEmail").value.trim().toLowerCase();

        if(!name || !email) return alert("يرجى إكمال البيانات");
        if(!email.includes('@')) return alert("الإيميل غير صحيح");

        try {
            await db.collection("allowed_students").doc(email).set({
                name: name,
                added_at: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById("newName").value = "";
            document.getElementById("newEmail").value = "";
            alert("تمت إضافة الطالب بنجاح");
        } catch (e) {
            alert("خطأ في الإضافة");
        }
    }

    async function deleteStudent(email) {
        if(confirm(`هل أنت متأكد من حذف الطالب صاحب الإيميل: ${email}؟`)) {
            await db.collection("allowed_students").doc(email).delete();
        }
    }

    // تشغيل الجلب لأول مرة عند تحميل الصفحة
    fetchStudents();
</script>

</body>
</html>
