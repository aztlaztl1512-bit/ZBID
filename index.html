<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الذكية | أ. عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --primary: #0284c7; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; text-align: right; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .import-section { background: #f8fafc; border: 2px dashed #cbd5e1; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        textarea { width: 100%; height: 150px; padding: 15px; border-radius: 10px; border: 1px solid #ddd; font-family: monospace; direction: ltr; margin-top: 10px; box-sizing: border-box; }
        .controls { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
        select, button { padding: 10px 20px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; }
        .btn-main { background: var(--primary); color: white; border: none; font-weight: bold; }
        .btn-clear { background: #ef4444; color: white; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #f8fafc; }
        .stats { margin-bottom: 10px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 الإضافة الجماعية للطلاب (160+ طالب)</h2>
    
    <div class="import-section">
        <label>انسخ قائمة الإيميلات والأسماء هنا (إيميل، اسم):</label>
        <textarea id="bulkData" placeholder="55563007@b.moe.gov.sa, عبد الرحمن العبداني&#10;53107956@b.moe.gov.sa, عبد العزيز الغنام"></textarea>
        
        <div class="controls">
            <select id="batchStage">
                <option value="أول ثانوي">أول ثانوي</option>
                <option value="ثاني ثانوي">ثاني ثانوي</option>
            </select>
            <select id="batchClass">
                <option value="فصل 1">فصل 1</option>
                <option value="فصل 2">فصل 2</option>
                <option value="فصل 3">فصل 3</option>
                <option value="فصل 4">فصل 4</option>
                <option value="فصل 5">فصل 5</option>
                <option value="فصل 6">فصل 6</option>
            </select>
            <button class="btn-main" onclick="processBulk()">🚀 رفع القائمة الآن</button>
            <button class="btn-clear" onclick="deleteAll()">⚠️ مسح كافة الطلاب</button>
        </div>
    </div>

    <div class="stats" id="countDisplay">إجمالي الطلاب المسجلين: 0</div>
    
    <table>
        <thead>
            <tr>
                <th>الاسم</th>
                <th>الإيميل الوزاري</th>
                <th>الصف/الفصل</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // دالة المعالجة الجماعية
    async function processBulk() {
        const rawData = document.getElementById('bulkData').value.trim();
        const stage = document.getElementById('batchStage').value;
        const className = document.getElementById('batchClass').value;
        
        if(!rawData) return alert("يرجى لصق البيانات أولاً");

        const lines = rawData.split('\n');
        let successCount = 0;

        alert("بدء رفع " + lines.length + " طالب... يرجى الانتظار");

        for(let line of lines) {
            // تقسيم السطر (يفترض وجود فاصلة أو مسافة بين الإيميل والاسم)
            const parts = line.split(/[,|,|\t]/); 
            if(parts.length >= 2) {
                const email = parts[0].trim().toLowerCase();
                const name = parts[1].trim();

                await db.collection("allowed_students").doc(email).set({
                    name: name,
                    email: email,
                    stage: stage,
                    class: className,
                    addedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                successCount++;
            }
        }
        alert("تم بنجاح رفع " + successCount + " طالباً إلى " + stage + " - " + className);
        document.getElementById('bulkData').value = "";
    }

    // عرض القائمة وتحديثها
    db.collection("allowed_students").orderBy("addedAt", "desc").onSnapshot(snap => {
        let html = "";
        document.getElementById('countDisplay').innerText = "إجمالي الطلاب المسجلين: " + snap.size;
        snap.forEach(doc => {
            const s = doc.data();
            html += `<tr>
                <td>${s.name}</td>
                <td>${s.email}</td>
                <td>${s.stage} - ${s.class}</td>
                <td><button onclick="deleteStudent('${doc.id}')" style="color:red; border:none; background:none; cursor:pointer;">حذف</button></td>
            </tr>`;
        });
        document.getElementById('studentTable').innerHTML = html;
    });

    async function deleteStudent(id) {
        if(confirm("هل أنت متأكد؟")) await db.collection("allowed_students").doc(id).delete();
    }

    async function deleteAll() {
        if(confirm("تحذير: سيتم مسح كافة الطلاب الـ 160 من النظام! هل أنت متأكد؟")) {
            const batch = db.batch();
            const snap = await db.collection("allowed_students").get();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            alert("تم مسح القائمة بالكامل");
        }
    }
</script>
</body>
</html>
