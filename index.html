<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم الشاملة - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        :root { --maroon: #800000; --gold: #d4af37; --bg: #fdfaf1; --danger: #c62828; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; }
        .admin-card { background: white; max-width: 1000px; margin: auto; border-radius: 15px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-top: 8px solid var(--maroon); }
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; }
        .bulk-section { background: #f4f4f4; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px dashed var(--maroon); }
        textarea { width: 100%; height: 200px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-family: sans-serif; resize: vertical; box-sizing: border-box; }
        .controls { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-upload { background: var(--maroon); color: var(--gold); }
        .btn-delete-all { background: var(--danger); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--maroon); color: var(--gold); padding: 12px; position: sticky; top: 0; }
        td { border-bottom: 1px solid #eee; padding: 10px; text-align: center; }
        .stats-bar { margin-bottom: 15px; font-weight: bold; color: var(--maroon); font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="header">
        <h2>المعالج النهائي للقوائم (ZBID) 🔒</h2>
        <p>لا تقلق بشأن الترتيب (إيميل ثم اسم أو العكس)، الكود سيعالجها جميعاً</p>
    </div>

    <div class="bulk-section">
        <label><strong>لصق القائمة هنا:</strong></label>
        <textarea id="bulkInput" placeholder="الصق هنا.. لا يهم إذا بدأ السطر بالاسم أو الإيميل"></textarea>
        <div class="controls">
            <button class="btn btn-upload" onclick="superSmartBulkAdd()">بدء المعالجة والرفع 🚀</button>
            <button class="btn btn-delete-all" onclick="deleteAllStudents()">حذف الكل 🗑️</button>
        </div>
    </div>

    <div class="stats-bar" id="studentCount">جاري التحميل...</div>

    <table id="studentsTable">
        <thead>
            <tr>
                <th>الاسم</th>
                <th>البريد الإلكتروني</th>
                <th>الإجراء</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkCO7FDQXd89YDf843J4_AtvEFvzzt-R0",
        authDomain: "aztlg-494c3.firebaseapp.com",
        projectId: "aztlg-494c3",
        storageBucket: "aztlg-494c3.firebasestorage.app",
        messagingSenderId: "597051893949",
        appId: "1:597051893949:web:de5554ac900317a92b2fd4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function fetchStudents() {
        const tbody = document.querySelector("#studentsTable tbody");
        db.collection("allowed_students").orderBy("name").onSnapshot((snapshot) => {
            document.getElementById("studentCount").innerText = `عدد الطلاب الحالي: ${snapshot.size}`;
            tbody.innerHTML = "";
            snapshot.forEach((doc) => {
                tbody.innerHTML += `<tr><td>${doc.data().name}</td><td>${doc.id}</td><td><button onclick="deleteSingle('${doc.id}')" style="color:red; cursor:pointer; background:none; border:none;">حذف</button></td></tr>`;
            });
        });
    }

    async function superSmartBulkAdd() {
        const input = document.getElementById("bulkInput").value.trim();
        if(!input) return alert("يرجى لصق البيانات");

        const lines = input.split('\n').map(l => l.trim()).filter(l => l !== "");
        const batch = db.batch();
        let count = 0;

        for(let i = 0; i < lines.length; i++) {
            let line1 = lines[i];
            let line2 = lines[i+1];

            if(!line2) break; // نهاية القائمة

            let name = "", email = "";

            // حالة 1: السطر الأول اسم والثاني إيميل
            if(!line1.includes('@') && line2.includes('@')) {
                name = line1; email = line2.toLowerCase();
                i++; // قفزة مزدوجة
            } 
            // حالة 2: السطر الأول إيميل والثاني اسم
            else if(line1.includes('@') && !line2.includes('@')) {
                email = line1.toLowerCase(); name = line2;
                i++; // قفزة مزدوجة
            }

            if(name && email) {
                const ref = db.collection("allowed_students").doc(email);
                batch.set(ref, { name: name, added_at: firebase.firestore.FieldValue.serverTimestamp() });
                count++;
            }
        }

        if(count > 0) {
            await batch.commit();
            alert(`تم رفع ${count} طالب بنجاح!`);
            document.getElementById("bulkInput").value = "";
        } else {
            alert("تنسيق غير معروف. تأكد من وجود الاسم والإيميل في سطرين متتاليين.");
        }
    }

    async function deleteAllStudents() {
        if(!confirm("مسح القائمة بالكامل؟")) return;
        const snapshot = await db.collection("allowed_students").get();
        const batch = db.batch();
        snapshot.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        alert("تم التصفير.");
    }

    async function deleteSingle(email) {
        if(confirm(`حذف ${email}؟`)) await db.collection("allowed_students").doc(email).delete();
    }

    fetchStudents();
</script>

</body>
</html>
